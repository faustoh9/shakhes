<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    
    <title>محاسبه‌گر خسارت تأخیر تأدیه | بر اساس شاخص بانک مرکزی</title>
    <meta name="description" content="محاسبه دقیق و آنلاین خسارت تأخیر تأدیه چک و بدهی‌ها به صورت رایگان بر اساس شاخص تورم ماهانه بانک مرکزی جمهوری اسلامی ایران.">
    <meta name="robots" content="index, follow">

    <!-- Bootstrap 5.3 RTL CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css">
    <!-- Vazirmatn Font -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/vazirmatn@33.0.3/Vazirmatn-font-face.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">

    <main class="container py-5">
        <header class="row justify-content-center mb-4">
            <div class="col-lg-8 text-center">
                <h1 class="h3 fw-bold text-primary mb-3">محاسبه‌گر خسارت تأخیر تأدیه</h1>
                <p class="text-muted">بر اساس شاخص‌های ماهانه بانک مرکزی جمهوری اسلامی ایران</p>
            </div>
        </header>

        <div class="row justify-content-center">
            <div class="col-lg-8 col-md-10">
                
                <div id="loading-spinner" class="text-center py-4">
                    <div class="spinner-border text-primary" role="status"></div>
                    <p class="mt-2 text-muted">در حال دریافت شاخص‌ها...</p>
                </div>

                <div id="error-container" class="alert alert-danger d-none shadow-sm" role="alert"></div>

                <div id="calculator-card" class="card shadow-sm border-0 d-none mb-4 p-4">
                    <form id="calc-form" novalidate>
                        <div class="mb-4">
                            <label for="principal" class="form-label fw-bold">مبلغ اصل دین (ریال / تومان)</label>
                            <input type="text" id="principal" class="form-control form-control-lg bg-light" placeholder="مثال: ۱,۰۰۰,۰۰۰" inputmode="numeric" required>
                        </div>

                        <div class="row g-3 mb-4">
                            <div class="col-md-6">
                                <label class="form-label fw-bold">تاریخ شروع (سررسید)</label>
                                <div class="d-flex gap-2">
                                    <select id="start-month" class="form-select bg-light" required>
                                        <option value="" selected disabled>ماه</option>
                                    </select>
                                    <select id="start-year" class="form-select bg-light" required>
                                        <option value="" selected disabled>سال</option>
                                    </select>
                                </div>
                            </div>
                            
                            <div class="col-md-6">
                                <label class="form-label fw-bold">تاریخ پایان (یوم الادا)</label>
                                <div class="d-flex gap-2">
                                    <select id="end-month" class="form-select bg-light" required>
                                        <option value="" selected disabled>ماه</option>
                                    </select>
                                    <select id="end-year" class="form-select bg-light" required>
                                        <option value="" selected disabled>سال</option>
                                    </select>
                                </div>
                            </div>
                        </div>

                        <div class="d-flex gap-3 mt-2">
                            <button type="submit" class="btn btn-primary btn-lg flex-grow-1 fw-bold">محاسبه خسارت</button>
                            <button type="button" id="btn-clear" class="btn btn-outline-secondary btn-lg">پاک کردن</button>
                        </div>
                    </form>
                </div>

                <div id="result-card" class="card shadow-sm border-0 d-none p-4 result-box">
                    <h3 class="h5 fw-bold text-success border-bottom pb-3 mb-4">نتیجه محاسبه</h3>
                    
                    <div class="row mb-3">
                        <div class="col-sm-6 text-muted">شاخص مبدأ (شروع):</div>
                        <div class="col-sm-6 fw-bold text-end" id="res-start-index">-</div>
                    </div>
                    
                    <div class="row mb-3">
                        <div class="col-sm-6 text-muted">شاخص مقصد (پایان):</div>
                        <div class="col-sm-6 fw-bold text-end" id="res-end-index">-</div>
                    </div>

                    <div class="row mb-3">
                        <div class="col-sm-6 text-muted">ضریب تغییرات:</div>
                        <div class="col-sm-6 fw-bold text-end" id="res-multiplier">-</div>
                    </div>

                    <div class="row mb-3">
                        <div class="col-sm-6 text-muted">مبلغ خسارت تأخیر:</div>
                        <div class="col-sm-6 fw-bold text-end text-danger" id="res-delay-amount">-</div>
                    </div>

                    <div class="row mb-4 bg-light p-3 rounded mt-2">
                        <div class="col-sm-6 text-dark fw-bold align-self-center">مبلغ نهایی (اصل دین + خسارت):</div>
                        <div class="col-sm-6 h4 mb-0 fw-bold text-end text-primary" id="res-final-amount">-</div>
                    </div>

                    <div class="text-center mt-3">
                        <button type="button" id="btn-copy" class="btn btn-outline-primary w-100">کپی نتیجه در حافظه</button>
                    </div>
                </div>

            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
