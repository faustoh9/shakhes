<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    
    <title>محاسبه‌گر خسارت تأخیر تأدیه | مدرن</title>
    <meta name="description" content="محاسبه آنلاین خسارت تأخیر تأدیه چک و بدهی‌ها بر اساس شاخص بانک مرکزی با رابط کاربری مدرن.">
    <meta name="robots" content="index, follow">

    <!-- Bootstrap 5.3 RTL CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css">
    
    <!-- Estedad Font -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/font-estedad@1.1.2/css/estedad.min.css">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gradient-modern">

    <main class="container py-5">
        <header class="row justify-content-center mb-5">
            <div class="col-lg-8 text-center text-white">
                <h1 class="fw-bold mb-3">محاسبه‌گر خسارت تأخیر تأدیه</h1>
                <p class="opacity-75 fs-5">محاسبه دقیق بر اساس شاخص‌های ماهانه بانک مرکزی</p>
            </div>
        </header>

        <div class="row justify-content-center">
            <div class="col-lg-7 col-md-10">
                
                <!-- Loading -->
                <div id="loading-spinner" class="text-center py-5">
                    <div class="spinner-border text-light" role="status"></div>
                    <p class="mt-3 text-light">در حال دریافت جدیدترین شاخص‌ها...</p>
                </div>

                <!-- Error Alert -->
                <div id="error-container" class="alert alert-danger custom-alert d-none shadow-sm" role="alert"></div>

                <!-- Main Calculator Card -->
                <div id="calculator-card" class="card custom-card d-none mb-4 p-4 p-sm-5">
                    <form id="calc-form" novalidate>
                        
                        <!-- Principal Amount -->
                        <div class="mb-4">
                            <label for="principal" class="form-label fw-bold text-secondary">مبلغ اصل دین (ریال)</label>
                            <input type="text" id="principal" class="form-control form-control-lg custom-input" placeholder="مثال: ۱,۰۰۰,۰۰۰" inputmode="numeric" required>
                        </div>

                        <div class="row g-4 mb-5">
                            <!-- Start Date -->
                            <div class="col-md-6">
                                <label class="form-label fw-bold text-secondary">تاریخ شروع (سررسید)</label>
                                <div class="d-flex gap-2">
                                    <select id="start-month" class="form-select custom-input" required>
                                        <option value="" selected disabled>ماه</option>
                                    </select>
                                    <select id="start-year" class="form-select custom-input" required>
                                        <option value="" selected disabled>سال</option>
                                    </select>
                                </div>
                            </div>
                            
                            <!-- End Date -->
                            <div class="col-md-6">
                                <label class="form-label fw-bold text-secondary">تاریخ پایان (یوم الادا)</label>
                                <div class="d-flex gap-2">
                                    <select id="end-month" class="form-select custom-input" required>
                                        <option value="" selected disabled>ماه</option>
                                    </select>
                                    <select id="end-year" class="form-select custom-input" required>
                                        <option value="" selected disabled>سال</option>
                                    </select>
                                </div>
                            </div>
                        </div>

                        <div class="d-flex gap-3">
                            <button type="submit" class="btn btn-primary btn-lg custom-btn-primary flex-grow-1 fw-bold shadow">محاسبه خسارت</button>
                            <button type="button" id="btn-clear" class="btn btn-light btn-lg custom-btn-secondary px-4">پاک کردن</button>
                        </div>
                    </form>
                </div>

                <!-- Results Card -->
                <div id="result-card" class="card custom-card result-card d-none p-4 p-sm-5">
                    <div class="text-center mb-4 pb-3 border-bottom">
                        <span class="badge bg-success bg-opacity-10 text-success fs-6 px-3 py-2 rounded-pill mb-2">محاسبه با موفقیت انجام شد</span>
                    </div>
                    
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <span class="text-secondary fw-bold">اصل دین:</span>
                        <span class="fs-5 fw-bold text-dark" id="res-principal-amount">-</span>
                    </div>
                    
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <span class="text-secondary fw-bold">خالص خسارت:</span>
                        <span class="fs-5 fw-bold text-danger" id="res-delay-amount">-</span>
                    </div>

                    <div class="d-flex justify-content-between align-items-center bg-primary bg-opacity-10 p-4 rounded-4 mb-4">
                        <span class="text-primary fw-bold fs-5">مجموع (اصل + خسارت):</span>
                        <span class="fs-3 fw-black text-primary" id="res-final-amount">-</span>
                    </div>

                    <button type="button" id="btn-copy" class="btn btn-outline-primary btn-lg custom-btn-outline w-100 fw-bold">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" class="bi bi-copy me-2" viewBox="0 0 16 16">
                            <path fill-rule="evenodd" d="M4 2a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2zm2-1a1 1 0 0 0-1 1v8a1 1 0 0 0 1 1h8a1 1 0 0 0 1-1V2a1 1 0 0 0-1-1zM2 5a1 1 0 0 0-1 1v8a1 1 0 0 0 1 1h8a1 1 0 0 0 1-1v-1h1v1a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h1v1z"/>
                        </svg>
                        کپی نتیجه
                    </button>
                </div>

            </div>
        </div>
    </main>

    <script src="app.js"></script>
</body>
</html>
